<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plano Magistratura v4 — Igor Gomes Miranda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#FAFAF8;--card:#FFFFFF;--border:#E8E6E1;--text:#1A1A18;--text2:#6B6B66;--text3:#9C9C96;
--accent:#4338CA;--accent-light:#EEF2FF;--accent-mid:#818CF8;
--done-bg:#ECFDF5;--done-border:#059669;--done-text:#065F46;
--warn-bg:#FFF7ED;--warn-border:#D97706;--warn-text:#92400E;
--danger-bg:#FEF2F2;--danger-border:#EF4444;--danger-text:#991B1B;
--radius:10px;--radius-lg:14px;--shadow:0 1px 3px rgba(0,0,0,.06);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.container{max-width:520px;margin:0 auto;padding:12px 16px 120px;}
.tabs{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:3px;margin-bottom:14px;position:sticky;top:8px;z-index:100;box-shadow:var(--shadow);}
.tab{flex:1;padding:9px 6px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:var(--radius);font-family:inherit;transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(67,56,202,.3);}
.header{text-align:center;padding:12px 0 6px;}
.header-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
.exam-cd{margin-top:5px;font-size:12px;font-weight:600;color:var(--danger-text);background:var(--danger-bg);display:inline-block;padding:3px 12px;border-radius:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:10px 0;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px 5px;text-align:center;box-shadow:var(--shadow);}
.stat-val{font-size:15px;font-weight:700;color:var(--accent);}
.stat-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
.progress-wrap{margin:8px 0 12px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-mid));border-radius:3px;transition:width .4s;}
.progress-info{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px;}
.mo-strip{display:flex;gap:3px;justify-content:center;margin-bottom:10px;}
.mo-btn{padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;color:var(--text3);font-family:inherit;font-weight:500;transition:all .15s;}
.mo-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.day-nav{display:flex;align-items:center;justify-content:space-between;margin:6px 0;gap:6px;}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s;}
.nav-btn:hover{background:var(--accent-light);color:var(--accent);}
.nav-btn:disabled{opacity:.3;}
.nav-center{text-align:center;flex:1;}
.nav-dow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);}
.nav-date{font-size:19px;font-weight:700;}
.nav-week{font-size:10px;color:var(--text3);}
.week-dots{display:flex;gap:3px;justify-content:center;margin-bottom:10px;}
.wd{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);transition:all .15s;position:relative;}
.wd.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.wd.today:not(.active){border-color:var(--accent);color:var(--accent);}
.wd.all-done{border-color:var(--done-border);}
.wd.all-done::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--done-border);}

/* REVIEW BOX */
.rv-section{border-radius:var(--radius-lg);padding:12px;margin-bottom:10px;border:1.5px solid;overflow:hidden;}
.rv-header{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.rv-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}
.rv-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.rv-item:last-child{border-bottom:none;}
.rv-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;}
.rv-tag.t24{background:#DBEAFE;color:#1E40AF;}
.rv-tag.t48{background:#E0E7FF;color:#3730A3;}
.rv-tag.t30{background:#FCE7F3;color:#9D174D;}
.rv-tag.t60{background:#FEE2E2;color:#991B1B;}
.rv-mat{font-size:11px;font-weight:500;flex:1;}
.rv-tip{font-size:9px;color:var(--text3);font-style:italic;}
.rv-origin{font-size:9px;color:var(--text3);}
.rv-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s;flex-shrink:0;}
.rv-check.done{background:var(--done-border);border-color:var(--done-border);color:#fff;}
.rv-how{font-size:10px;color:var(--text3);margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.02);border-radius:var(--radius);line-height:1.5;}

/* EVENT CARD */
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);transition:all .15s;}
.ev-card.completed{background:var(--done-bg);border-color:var(--done-border);}
.ev-left{width:4px;min-height:100%;}
.ev-body{padding:10px 12px;}
.ev-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ev-time{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;opacity:.6;}
.ev-link{font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;text-decoration:none;color:#fff;}
.ev-title{font-size:13px;font-weight:600;line-height:1.3;}
.ev-detail{font-size:10px;opacity:.5;margin-top:2px;line-height:1.4;}
.ev-leis{margin-top:5px;font-size:10px;color:var(--accent-dark);background:var(--accent-light);padding:6px 8px;border-radius:var(--radius);line-height:1.5;}
.ev-leis b{font-weight:600;}
.ev-ctrls{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center;}
.btn-done{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-done:hover{border-color:var(--done-border);color:var(--done-border);}
.btn-done.is-done{background:var(--done-border);color:#fff;border-color:var(--done-border);}
.pg-input{width:68px;padding:4px 7px;border-radius:20px;border:1.5px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;text-align:center;background:transparent;color:var(--text);}
.pg-input:focus{outline:none;border-color:var(--accent);}
.ex-row{display:flex;gap:4px;align-items:center;margin-top:5px;}
.ex-label{font-size:9px;color:var(--text3);}
.ex-input{width:36px;padding:3px 5px;border-radius:8px;border:1.5px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;text-align:center;background:transparent;color:var(--text);}
.ex-input:focus{outline:none;border-color:var(--accent);}
.ex-pct{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.ex-pct.good{background:#ECFDF5;color:#059669;}
.ex-pct.mid{background:#FFFBEB;color:#D97706;}
.ex-pct.bad{background:#FEF2F2;color:#EF4444;}
.ev-notes{margin-top:5px;}
.notes-tog{font-size:10px;color:var(--accent);cursor:pointer;font-weight:600;border:none;background:none;font-family:inherit;padding:0;}
.notes-area{width:100%;margin-top:4px;padding:5px 8px;border-radius:var(--radius);border:1.5px solid var(--border);font-size:11px;font-family:inherit;resize:vertical;min-height:36px;background:transparent;color:var(--text);}
.notes-area:focus{outline:none;border-color:var(--accent);}
.jump-row{display:flex;gap:5px;justify-content:center;margin-top:10px;}
.jump-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:10px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;box-shadow:var(--shadow);transition:all .15s;}
.jump-btn:hover{border-color:var(--accent);color:var(--accent);}
.jump-btn.today-btn{background:var(--accent);color:#fff;border-color:var(--accent);}
.export-row{text-align:center;margin-top:14px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.export-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:10px;font-weight:500;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.export-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Analytics */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:10px;box-shadow:var(--shadow);}
.chart-title{font-size:11px;font-weight:700;margin-bottom:8px;}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.bar-label{font-size:9px;color:var(--text2);width:80px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;}
.bar-val{font-size:9px;font-weight:600;color:var(--text2);width:32px;text-align:right;}
.streak-card{text-align:center;padding:16px;}
.streak-num{font-size:36px;font-weight:700;color:var(--accent);}
.streak-label{font-size:11px;color:var(--text3);}

/* Timer */
.timer-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;text-align:center;box-shadow:var(--shadow);}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--accent);margin:8px 0;}
.timer-label{font-size:11px;color:var(--text3);margin-bottom:8px;}
.timer-btns{display:flex;gap:6px;justify-content:center;}
.timer-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--accent);background:transparent;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent);transition:all .15s;}
.timer-btn.primary{background:var(--accent);color:#fff;}
.timer-modes{display:flex;gap:4px;justify-content:center;margin-bottom:8px;}
.timer-mode{padding:4px 10px;border-radius:15px;border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;font-family:inherit;color:var(--text3);transition:all .15s;}
.timer-mode.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Method explainer */
.method-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.method-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.method-text{font-size:11px;color:var(--text2);line-height:1.6;}
.method-table{width:100%;font-size:10px;border-collapse:collapse;margin-top:8px;}
.method-table th{text-align:left;padding:4px 6px;background:var(--accent-light);color:var(--accent);font-weight:600;border-radius:4px;}
.method-table td{padding:4px 6px;border-bottom:1px solid var(--border);}
.method-table td:first-child{font-weight:600;color:var(--accent);}

.empty-day{text-align:center;padding:24px;color:var(--text3);font-size:13px;}
</style>
</head>

function getStudySubjects(di){

      const name=ev.label.replace(/ — \d+ pág/,'').replace(/ — .*/,'');

        subs.push({name,dayIdx:di,evIdx:ei});
      }
    }
  });
  return subs;
}

function getReviewsForDay(di){
  const tDate=allDays[di].date;
  const reviews=[];
  for(let d=0;d<allDays.length;d++){
    const sDate=allDays[d].date;
    const diff=Math.round((tDate-sDate)/864e5);
    if(diff<=0)continue;
    const subs=getStudySubjects(d);
    subs.forEach(sub=>{
      REVIEW_INTERVALS.forEach(iv=>{
        if(diff===iv.days){
          reviews.push({subject:sub.name,tag:iv.tag,cls:iv.cls,tip:iv.tip,originDay:d,originDate:sDate});
        }
      });
    });
  }
  return reviews;
}

  <div class="method-box">
    <div class="method-title">Lei seca — o que ler por dia?</div>
    <div class="method-text">Cada dia da semana tem leis específicas distribuídas. No bloco de lei seca, aparece o detalhamento dos diplomas e artigos prioritários. A distribuição segue o peso de cada matéria no ENAM (58% da prova é lei seca).</div>
    <table class="method-table">
      <tr><th>Dia</th><th>Matérias lei seca</th><th>Pág</th></tr>
      <tr><td>Seg</td><td>Proc. Civil + Tributário</td><td>6</td></tr>
      <tr><td>Ter</td><td>Civil + Consumidor</td><td>6</td></tr>
      <tr><td>Qua</td><td>Proc. Penal + Leg. Esp. + Penal G. + Penal E.</td><td>6</td></tr>
      <tr><td>Qui</td><td>Constitucional + Empresarial + Eleitoral</td><td>6</td></tr>
      <tr><td>Sex</td><td>Administrativo + Ambiental + ECA + Humanos</td><td>6</td></tr>
    </table>
  </div>`;
  return h;
}

function renderStudy(stats){
  const day=allDays[ci],d=day.date;
  const dn=DN[d.getDay()],ds=`${d.getDate()} de ${MN[d.getMonth()]}`;
  const wn=Math.floor(ci/7)+1,tw=Math.ceil(allDays.length/7);
  const prog=stats.total?Math.round((stats.done/stats.total)*100):0;
  const dayDone=getDayDone(ci),dayTotal=getDayTotal(ci);
  let h='';
  h+=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${stats.done}</div><div class="stat-label">feitos</div></div>
    <div class="stat-card"><div class="stat-val">${stats.total-stats.done}</div><div class="stat-label">pendentes</div></div>
    <div class="stat-card"><div class="stat-val">${prog}%</div><div class="stat-label">progresso</div></div>
    <div class="stat-card"><div class="stat-val">${getStreak()}</div><div class="stat-label">streak</div></div>
  </div>`;
  h+=`<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div class="progress-info"><span>Sem. ${wn}/${tw}</span><span>${stats.done}/${stats.total}</span></div></div>`;
  const months=[{l:'abr',m:3},{l:'mai',m:4},{l:'jun',m:5},{l:'jul',m:6},{l:'ago',m:7},{l:'set',m:8},{l:'out',m:9},{l:'nov',m:10}];
  h+=`<div class="mo-strip">`;months.forEach(mo=>{h+=`<button class="mo-btn${d.getMonth()===mo.m?' active':''}" onclick="jumpMo(${mo.m})">${mo.l}</button>`;});h+=`</div>`;
  h+=`<div class="day-nav">
    <button class="nav-btn" onclick="nav(-1)" ${ci===0?'disabled':''}>&larr;</button>
    <div class="nav-center"><div class="nav-dow">${dn}</div><div class="nav-date">${ds}</div><div class="nav-week">semana ${wn}</div></div>
    <button class="nav-btn" onclick="nav(1)" ${ci===allDays.length-1?'disabled':''}>&rarr;</button>
  </div>`;
  h+=`<div class="week-dots">`;const ws=Math.floor(ci/7)*7;
  for(let i=0;i<7;i++){const idx=ws+i;if(idx<allDays.length){const dd=allDays[idx].date;const act=idx===ci;const td=(()=>{const t=new Date();t.setHours(0,0,0,0);return dd.getFullYear()===t.getFullYear()&&dd.getMonth()===t.getMonth()&&dd.getDate()===t.getDate();})();const ad=getDayDone(idx)===getDayTotal(idx)&&getDayTotal(idx)>0;h+=`<button class="wd${act?' active':''}${td?' today':''}${ad?' all-done':''}" onclick="goTo(${idx})">${dd.getDate()}</button>`;}}
  h+=`</div>`;

  // REVIEW SECTION
  const reviews=getReviewsForDay(ci);
  if(reviews.length>0){
    h+=`<div class="rv-section" style="background:linear-gradient(135deg,#FFF7ED,#FFFBEB);border-color:var(--warn-border);">
      <div class="rv-header" style="color:var(--warn-text)"><div class="rv-icon" style="background:var(--warn-border)">R</div>Revisão espaçada — ${reviews.length} matéria${reviews.length>1?'s':''}</div>`;
    reviews.forEach((rv,ri)=>{
      const rvSt=ldRv(ci,ri);
      const oDate=`${rv.originDate.getDate()}/${rv.originDate.getMonth()+1}`;
      h+=`<div class="rv-item">
        <span class="rv-tag ${rv.cls}">${rv.tag}</span>
        <div style="flex:1"><div class="rv-mat" style="color:var(--warn-text)">${rv.subject}</div>
        <div class="rv-tip">${rv.tip}</div>
        <div class="rv-origin">Estudado em ${oDate}</div></div>
        <button class="rv-check${rvSt.done?' done':''}" onclick="toggleRv(${ci},${ri})">${rvSt.done?'&#10003;':''}</button>
      </div>`;
    });
    h+=`</div>`;
  }

  // Events
  if(!day.events.length){h+=`<div class="empty-day">Sem atividades programadas.</div>`;}
  else{
    if(dayTotal>0)h+=`<div style="font-size:11px;color:var(--text3);margin-bottom:8px;">${dayTotal} blocos${dayDone?` &middot; <span style="color:var(--done-border);font-weight:600">${dayDone}/${dayTotal} feitos</span>`:''}</div>`;
    day.events.forEach((ev,ei)=>{
      if(ev.isReview) return; // handled above
      const c=gc(ev.label);const link=gl(ev.label);const st=ld(ci,ei);const done=st.done||false;
      h+=`<div class="ev-card${done?' completed':''}"><div style="display:flex;"><div class="ev-left" style="background:${done?'var(--done-border)':c.br}"></div>
        <div class="ev-body" style="flex:1;">
          <div class="ev-top"><span class="ev-time" style="color:${done?'var(--done-text)':c.tx}">${ev.time}</span>
          ${link?`<a href="${link}" target="_blank" class="ev-link" style="background:${c.br}">PDF &nearr;</a>`:''}</div>
          <div class="ev-title" style="color:${done?'var(--done-text)':c.tx}">${ev.label}</div>`;

      // Lei seca detail
      if(ev.lsKey && LEI_SECA_DETAIL[ev.lsKey]){
        const ls=LEI_SECA_DETAIL[ev.lsKey];
        h+=`<div class="ev-leis"><b>Leis do dia:</b><br>`;
        ls.leis.forEach(l=>{h+=`&bull; <b>${l.materia}</b> (${l.pags}p): ${l.leis}<br>`;});
        h+=`</div>`;
      }

      h+=`<div class="ev-ctrls">
            <button class="btn-done${done?' is-done':''}" onclick="toggleDone(${ci},${ei})">${done?'&#10003; Feito':'Marcar feito'}</button>
            <input class="pg-input" type="text" placeholder="pág." value="${st.page||''}" onchange="savePg(${ci},${ei},this.value)">
          </div>`;
      if(ev.isEx){
        const pct=st.total_q?(Math.round((parseInt(st.acertos||0)/parseInt(st.total_q))*100)):null;
        const pctCls=pct===null?'':pct>=70?'good':pct>=50?'mid':'bad';
        h+=`<div class="ex-row"><span class="ex-label">Acertos:</span><input class="ex-input" type="number" value="${st.acertos||''}" onchange="saveEx(${ci},${ei},'acertos',this.value)">
          <span class="ex-label">de</span><input class="ex-input" type="number" placeholder="24" value="${st.total_q||''}" onchange="saveEx(${ci},${ei},'total_q',this.value)">
          ${pct!==null?`<span class="ex-pct ${pctCls}">${pct}%</span>`:''}</div>`;
      }
      h+=`<div class="ev-notes"><button class="notes-tog" onclick="toggleNotes(${ei})">${st.notes?'editar obs':'+ obs'}</button>
        <div id="nt-${ei}" style="display:${st.notes?'block':'none'}"><textarea class="notes-area" onchange="saveNt(${ci},${ei},this.value)">${st.notes||''}</textarea></div></div>
      </div></div></div>`;
    });
  }
  h+=`<div class="jump-row">
    <button class="jump-btn" onclick="nav(-7)">&larr; sem</button>
    <button class="jump-btn today-btn" onclick="goTo(${findToday()})">hoje</button>
    <button class="jump-btn" onclick="nav(7)">sem &rarr;</button>
  </div>`;
  h+=`<div class="export-row">
    <button class="export-btn" onclick="exportData()">Exportar</button>
    <label class="export-btn" style="cursor:pointer">Importar<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
  </div>`;
  return h;
}

function renderAnalytics(stats){
  let h='';
  h+=`<div class="chart-card streak-card"><div class="streak-num">${getStreak()}</div><div class="streak-label">dias consecutivos completos</div></div>`;
  const bs=getCompletionBySubject();const sa=Object.entries(bs).sort((a,b)=>(a[1].done/a[1].total)-(b[1].done/b[1].total));
  h+=`<div class="chart-card"><div class="chart-title">Progresso por matéria</div>`;
  sa.forEach(([n,d])=>{const p=d.total?Math.round((d.done/d.total)*100):0;const c=p>=70?'#059669':p>=40?'#D97706':'#EF4444';
    h+=`<div class="bar-row"><div class="bar-label">${n.replace('Civil - ','C.')}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div><div class="bar-val">${p}%</div></div>`;});
  h+=`</div>`;
  const es=getExerciseStats();const ea=Object.entries(es).filter(([_,d])=>d.t>0).sort((a,b)=>(a[1].a/a[1].t)-(b[1].a/b[1].t));
  if(ea.length){h+=`<div class="chart-card"><div class="chart-title">Desempenho exercícios</div>`;
    ea.forEach(([n,d])=>{const p=Math.round((d.a/d.t)*100);const c=p>=70?'#059669':p>=50?'#D97706':'#EF4444';
      h+=`<div class="bar-row"><div class="bar-label">${n.replace('Civil - ','C.')}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div><div class="bar-val">${p}%</div></div>`;});
    h+=`</div>`;}
  h+=`<div class="chart-card"><div class="chart-title">Conclusão por semana</div>`;
  const tw2=Math.ceil(allDays.length/7);
  for(let w=0;w<tw2;w++){let wd=0,wt=0;for(let i=w*7;i<Math.min((w+1)*7,allDays.length);i++){allDays[i].events.forEach((ev,ei)=>{if(ev.label!=='REVISÃO_BLOCK'){wt++;if(ld(i,ei).done)wd++;}});}
    const p=wt?Math.round((wd/wt)*100):0;const sd=allDays[w*7].date;
    h+=`<div class="bar-row"><div class="bar-label">S${w+1} (${sd.getDate()}/${sd.getMonth()+1})</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${p>=70?'#059669':p>=40?'#D97706':'#EF4444'}"></div></div><div class="bar-val">${p}%</div></div>`;}
  h+=`</div>`;
  return h;
}

function renderTimer(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  return`<div class="timer-section"><div class="timer-label">Pomodoro</div>
    <div class="timer-modes">
      <button class="timer-mode${timerMode===25?' active':''}" onclick="setTM(25)">25m</button>
      <button class="timer-mode${timerMode===45?' active':''}" onclick="setTM(45)">45m</button>
      <button class="timer-mode${timerMode===60?' active':''}" onclick="setTM(60)">60m</button>
      <button class="timer-mode${timerMode===5?' active':''}" onclick="setTM(5)">Pausa</button>
    </div>
    <div class="timer-display">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
    <div class="timer-btns">
      ${timerRun?`<button class="timer-btn" onclick="pauseT()">Pausar</button>`:`<button class="timer-btn primary" onclick="startT()">Iniciar</button>`}
      <button class="timer-btn" onclick="resetT()">Resetar</button>
    </div></div>`;
}

// ========== ACTIONS ==========
window.switchTab=function(t){tab=t;render();};
window.nav=function(dir){ci=Math.max(0,Math.min(allDays.length-1,ci+dir));render();};
window.goTo=function(i){ci=i;render();};
window.jumpMo=function(m){for(let i=0;i<allDays.length;i++){if(allDays[i].date.getMonth()===m){ci=i;render();return;}}};
window.toggleDone=function(di,ei){const s=ld(di,ei);s.done=!s.done;if(s.done)s.doneAt=new Date().toISOString();sv(di,ei,s);render();};
window.savePg=function(di,ei,v){const s=ld(di,ei);s.page=v;sv(di,ei,s);};
window.saveNt=function(di,ei,v){const s=ld(di,ei);s.notes=v;sv(di,ei,s);};
window.saveEx=function(di,ei,f,v){const s=ld(di,ei);s[f]=v;sv(di,ei,s);render();};
window.toggleNotes=function(ei){const el=document.getElementById('nt-'+ei);if(el)el.style.display=el.style.display==='none'?'block':'none';};
window.toggleRv=function(di,ri){const s=ldRv(di,ri);s.done=!s.done;svRv(di,ri,s);render();};
window.setTM=function(m){timerMode=m;timerSec=m*60;timerRun=false;if(timerInt)clearInterval(timerInt);render();};
window.startT=function(){if(!timerSec)timerSec=timerMode*60;timerRun=true;timerInt=setInterval(()=>{if(timerSec>0){timerSec--;render();}else{clearInterval(timerInt);timerRun=false;render();alert('Tempo esgotado!');}},1000);render();};
window.pauseT=function(){clearInterval(timerInt);timerRun=false;render();};
window.resetT=function(){clearInterval(timerInt);timerRun=false;timerSec=timerMode*60;render();};
window.exportData=function(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`magistratura_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();};
window.importData=function(evt){const f=evt.target.files[0];if(!f)return;const r=new FileReader();r.onload=async function(e){try{const d=JSON.parse(e.target.result);DB.blocks=d.blocks||{};DB.reviews=d.reviews||{};await setDoc(udoc(),DB);render();alert('Importado e sincronizado!');}catch(err){alert('Arquivo inválido.');}};r.readAsText(f);};

// ========== AUTH / BOOTSTRAP ==========
function renderLogin(mode, err){
  mode = mode || 'login';
  document.getElementById('app').innerHTML = `
    <div class="header"><div class="header-title">Magistratura — Plano de Estudos</div></div>
    <div class="method-box" style="max-width:340px;margin:40px auto 0;">
      <div class="method-title">${mode==='login'?'Entrar':'Criar conta'}</div>
      ${err?`<div style="font-size:11px;color:#EF4444;margin-bottom:8px;">${err}</div>`:''}
      <input id="li-email" type="email" placeholder="e-mail" class="pg-input" style="width:100%;border-radius:8px;margin-bottom:8px;box-sizing:border-box;padding:8px 10px;">
      <input id="li-pass" type="password" placeholder="senha" class="pg-input" style="width:100%;border-radius:8px;margin-bottom:12px;box-sizing:border-box;padding:8px 10px;">
      <button class="export-btn" style="width:100%;background:var(--accent);color:#fff;border-color:var(--accent);margin-bottom:8px;" onclick="${mode==='login'?'doLogin()':'doSignup()'}">${mode==='login'?'Entrar':'Criar conta'}</button>
      <button class="notes-tog" style="display:block;margin:0 auto;" onclick="${mode==='login'?"switchAuthMode('signup')":"switchAuthMode('login')"}">${mode==='login'?'Ainda não tenho conta':'Já tenho conta'}</button>
    </div>`;
}
window.switchAuthMode=function(m){renderLogin(m);};
window.doLogin=async function(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ renderLogin('login', 'Não foi possível entrar: verifique e-mail e senha.'); }
};
window.doSignup=async function(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  try{ await createUserWithEmailAndPassword(auth,email,pass); }
  catch(e){ renderLogin('signup', 'Não foi possível criar a conta: '+(e.code||'')+'.'); }
};
window.doLogout=async function(){ await signOut(auth); };

onAuthStateChanged(auth, async (user)=>{
  currentUser=user;
  if(user){
    document.getElementById('app').innerHTML='<div class="empty-day">Carregando seus dados…</div>';
    await loadUserData();
    timerSec=timerMode*60;
    render();
  } else {
    renderLogin('login');
  }
});
</script>
